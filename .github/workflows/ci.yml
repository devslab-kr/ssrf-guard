name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-home-cache-cleanup: true
          # Configuration cache occasionally trips up the Vanniktech publish
          # plugin's property-driven configuration — keep CI off it.
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Build and test
        run: ./gradlew build jacocoTestReport --no-configuration-cache --stacktrace

      - name: Upload coverage to Codecov
        if: success() && github.event_name == 'push'
        uses: codecov/codecov-action@v6
        with:
          # Multi-module layout — each subproject produces its own jacoco XML.
          # Codecov merges them server-side when multiple files are listed.
          # NOTE: comma-separated single line on purpose. The previous `>-`
          # folded-scalar form joined lines with ", " (comma + SPACE), and
          # codecov-action splits on commas only — every entry after the first
          # ended up with a leading space and failed the explicit-path lookup
          # (codecov then fell back to a directory scan, so uploads worked but
          # the log carried a noisy "not_found_files" warning every run).
          files: ./ssrf-guard-core/build/reports/jacoco/test/jacocoTestReport.xml,./ssrf-guard-httpclient5/build/reports/jacoco/test/jacocoTestReport.xml,./ssrf-guard-restclient/build/reports/jacoco/test/jacocoTestReport.xml,./ssrf-guard-resttemplate/build/reports/jacoco/test/jacocoTestReport.xml,./ssrf-guard-webclient/build/reports/jacoco/test/jacocoTestReport.xml,./ssrf-guard-feign/build/reports/jacoco/test/jacocoTestReport.xml,./ssrf-guard-springai/build/reports/jacoco/test/jacocoTestReport.xml,./ssrf-guard-jdkhttp/build/reports/jacoco/test/jacocoTestReport.xml,./ssrf-guard-okhttp/build/reports/jacoco/test/jacocoTestReport.xml
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          # Glob across every module so we pick up failures from any of them
          # without enumerating per-module paths.
          path: |
            **/build/reports/tests/
            **/build/test-results/
            **/build/reports/jacoco/
          retention-days: 7

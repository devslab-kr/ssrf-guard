name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Derive version from tag
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      # Diag: confirm the org-level Maven Central secrets actually reach this
      # repo. api-log's SIGNING_KEY journey taught us to verify shape first
      # (length, BEGIN/END PGP markers, multi-line preservation) rather than
      # re-paste blindly. Removed once publish is stable.
      - name: Diag — secret shape
        env:
          K: ${{ secrets.SIGNING_KEY }}
          ID: ${{ secrets.SIGNING_KEY_ID }}
          P: ${{ secrets.SIGNING_KEY_PASSWORD }}
          U: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          PW: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
        run: |
          echo "SIGNING_KEY length=${#K}"
          echo "SIGNING_KEY_ID length=${#ID}"
          echo "SIGNING_KEY_PASSWORD length=${#P}"
          echo "MAVEN_CENTRAL_USERNAME length=${#U}"
          echo "MAVEN_CENTRAL_PASSWORD length=${#PW}"
          if [[ "$K" == *"BEGIN PGP PRIVATE KEY"* ]]; then
            echo "SIGNING_KEY has BEGIN PGP header: YES"
          else
            echo "SIGNING_KEY has BEGIN PGP header: NO"
          fi
          if [[ "$K" == *"END PGP PRIVATE KEY"* ]]; then
            echo "SIGNING_KEY has END PGP footer: YES"
          else
            echo "SIGNING_KEY has END PGP footer: NO"
          fi
          line_count=$(printf '%s' "$K" | wc -l)
          echo "SIGNING_KEY newline count=$line_count"

      - name: Build and test
        run: ./gradlew build --no-configuration-cache --stacktrace -PVERSION=${{ steps.ver.outputs.version }}

      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          # See api-log starter — SIGNING_KEY_ID is 16-char long form but
          # Gradle's PgpKeyId only accepts 8-char short form. Trim last 8.
          SIGNING_KEY_ID_RAW: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          export ORG_GRADLE_PROJECT_signingInMemoryKeyId="${SIGNING_KEY_ID_RAW: -8}"
          ./gradlew publishAndReleaseToMavenCentral \
            --no-configuration-cache \
            --stacktrace \
            -PVERSION=${{ steps.ver.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: false
          files: |
            build/libs/*.jar
            build/libs/*.asc
